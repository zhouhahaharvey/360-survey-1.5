        // 加载文档
        function loadDoc(docId) {
            const doc = docs[docId];
            if (!doc) return;

            // 更新标题
            document.getElementById('docTitle').textContent = doc.title;
            document.getElementById('docMeta').textContent = doc.meta;
            document.getElementById('docContent').innerHTML = doc.content;

            // 更新导航高亮
            document.querySelectorAll('.doc-link').forEach(link => {
                link.classList.remove('active');
            });
            event.target.closest('.doc-link').classList.add('active');

            // 更新URL
            const url = new URL(window.location);
            url.searchParams.set('doc', docId);
            window.history.pushState({}, '', url);
        }

        // 页面加载时
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const docId = urlParams.get('doc') || 'readme';
            
            if (docs[docId]) {
                document.getElementById('docTitle').textContent = docs[docId].title;
                document.getElementById('docMeta').textContent = docs[docId].meta;
                document.getElementById('docContent').innerHTML = docs[docId].content;
                
                // 高亮对应导航
                document.querySelectorAll('.doc-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('onclick') && link.getAttribute('onclick').includes(docId)) {
                        link.classList.add('active');
                    }
                });
            }
        });
    </script>
