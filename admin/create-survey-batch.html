<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量发起调研 - 360调研系统</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 公共样式 -->
    <link rel="stylesheet" href="../styles/common.css">
    <link rel="stylesheet" href="../styles/admin.css">
    <style>
        .wizard-steps {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .step-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            background: var(--gray-200);
            color: var(--gray-600);
        }
        
        .step-item.active .step-number {
            background: var(--primary);
            color: white;
        }
        
        .step-item.completed .step-number {
            background: var(--success);
            color: white;
        }
        
        .step-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-600);
        }
        
        .step-item.active .step-label {
            color: var(--primary);
        }
        
        .step-divider {
            width: 60px;
            height: 2px;
            background: var(--gray-200);
            margin: 0 1rem;
        }
        
        .step-divider.completed {
            background: var(--success);
        }

        .card {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .batch-input-area {
            background: var(--gray-50);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .input-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .input-tab {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: pointer;
            border: 1px solid var(--gray-200);
            background: white;
            color: var(--gray-600);
        }
        
        .input-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .batch-textarea {
            width: 100%;
            min-height: 150px;
            padding: 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 0.875rem;
            resize: vertical;
            font-family: monospace;
        }
        
        .batch-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .input-hint {
            display: flex;
            justify-content: space-between;
            margin-top: 0.75rem;
            font-size: 0.75rem;
            color: var(--gray-600);
        }
        
        .btn-text {
            color: var(--primary);
            cursor: pointer;
        }
        
        .employee-table {
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 50px 1.5fr 1fr 1fr 1fr 100px 60px;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-600);
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 50px 1.5fr 1fr 1fr 1fr 100px 60px;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--gray-100);
            align-items: center;
        }
        
        .table-row:hover {
            background: var(--gray-50);
        }
        
        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .emp-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .emp-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .emp-name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-800);
        }
        
        .emp-id {
            font-size: 0.75rem;
            color: var(--gray-600);
        }
        
        .emp-cell {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        
        .relation-summary {
            display: flex;
            gap: 0.25rem;
            font-size: 0.75rem;
        }
        
        .rel-badge {
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .rel-up { background: #dbeafe; color: #1e40af; }
        .rel-peer { background: #d1fae5; color: #065f46; }
        .rel-down { background: #ffedd5; color: #9a3412; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-ready {
            background: #d1fae5;
            color: #065f46;
        }
        
        .action-btn {
            color: var(--danger);
            cursor: pointer;
            font-size: 0.875rem;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary-light);
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .stats-info {
            display: flex;
            gap: 2rem;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        
        .batch-actions {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        .alert-info-custom {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            background: #dbeafe;
            color: #1e40af;
        }

        @media (max-width: 768px) {
            .table-header, .table-row {
                grid-template-columns: 40px 2fr 1fr 60px;
            }
            .table-header > *:nth-child(4),
            .table-header > *:nth-child(5),
            .table-row > *:nth-child(5),
            .table-row > *:nth-child(6) {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="adminSidebar"></aside>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 页面头部 -->
        <div class="page-header mb-4">
            <div class="page-title">
                <a href="dashboard.html" class="back-to-home">
                    <i class="bi bi-arrow-left"></i>
                    返回首页
                </a>
                <h1>批量发起调研</h1>
            </div>
        </div>

        <!-- Wizard Steps -->
        <div class="wizard-steps">
            <div class="step-item completed">
                <div class="step-number"><i class="bi bi-check"></i></div>
                <span class="step-label">选择场景</span>
            </div>
            <div class="step-divider completed"></div>
            <div class="step-item active">
                <div class="step-number">2</div>
                <span class="step-label">批量导入</span>
            </div>
            <div class="step-divider"></div>
            <div class="step-item">
                <div class="step-number">3</div>
                <span class="step-label">确认关系</span>
            </div>
            <div class="step-divider"></div>
            <div class="step-item">
                <div class="step-number">4</div>
                <span class="step-label">配置通知</span>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">批量选择被评估人</div>
                <p class="card-subtitle">支持一次发起多人的晋升评估，系统将自动为每个人识别评估关系</p>
            </div>
            <div class="card-body">
                <!-- Alert -->
                <div class="alert-info-custom">
                    <i class="bi bi-info-circle"></i>
                    <span>当前场景：晋升评估 - 将使用同一套模板和截止时间</span>
                </div>

                <!-- Input Area -->
                <div class="batch-input-area">
                    <div class="input-tabs">
                        <div class="input-tab active">粘贴工号</div>
                        <div class="input-tab">上传Excel</div>
                        <div class="input-tab">部门筛选</div>
                    </div>
                    <textarea class="batch-textarea" id="batchInput" placeholder="请粘贴工号，每行一个，或逗号分隔&#10;例如：&#10;10001&#10;10002&#10;10003">10001
10002
10003</textarea>
                    <div class="input-hint">
                        <span>已识别 3 个工号</span>
                        <span class="btn-text" onclick="parseBatch()"><i class="bi bi-search"></i> 开始解析</span>
                    </div>
                </div>

                <!-- Stats Bar -->
                <div class="stats-bar" id="statsBar" style="display: none;">
                    <div class="stats-info">
                        <div class="stat-item">
                            <span class="stat-value" id="totalCount">3</span>
                            <span class="stat-label">人已选择</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="relationCount">12</span>
                            <span class="stat-label">位评估人</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="msgCount">15</span>
                            <span class="stat-label">条消息</span>
                        </div>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="clearAll()">
                        <i class="bi bi-trash"></i> 清空
                    </button>
                </div>

                <!-- Batch Actions -->
                <div class="batch-actions" id="batchActions" style="display: none;">
                    <button class="btn btn-outline btn-sm" onclick="checkAll(true)">
                        <i class="bi bi-check-square"></i> 全选
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="checkAll(false)">
                        <i class="bi bi-square"></i> 取消全选
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="removeSelected()">
                        <i class="bi bi-trash"></i> 删除选中
                    </button>
                </div>

                <!-- Employee Table -->
                <div class="employee-table" id="employeeTable" style="display: none;">
                    <div class="table-header">
                        <input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll()">
                        <span>员工信息</span>
                        <span>部门</span>
                        <span>职级</span>
                        <span>评估关系</span>
                        <span>状态</span>
                        <span>操作</span>
                    </div>
                    <div id="tableBody">
                        <!-- Dynamic rows -->
                    </div>
                </div>
            </div>
            
            <div class="card-footer">
                <button class="btn btn-outline" onclick="history.back()">
                    <i class="bi bi-arrow-left"></i>
                    上一步
                </button>
                <button class="btn btn-primary" id="nextBtn" disabled onclick="goToStep3()">
                    下一步：确认关系
                    <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/common.js"></script>
    <script src="../data-store.js"></script>
    <script>
        // 渲染侧边栏
        function renderSidebar() {
            const sidebar = document.getElementById('adminSidebar');
            sidebar.innerHTML = `
                <div class="sidebar-brand">
                    <i class="bi bi-360"></i>
                    <span>360调研系统</span>
                </div>
                <nav class="nav-menu">
                    <a href="dashboard.html" class="nav-item">
                        <i class="bi bi-house-door"></i>
                        <span>首页</span>
                    </a>
                    <a href="create-survey-step1.html" class="nav-item active">
                        <i class="bi bi-plus-circle"></i>
                        <span>发起调研</span>
                    </a>
                    <a href="my-pending-reviews.html" class="nav-item">
                        <i class="bi bi-hourglass-split"></i>
                        <span>我的待审核</span>
                        <span class="badge badge-orange" id="pendingBadge" style="display: none;">0</span>
                    </a>
                    <a href="create-survey-step4.html" class="nav-item" style="background: #fef2f2; color: #dc2626;">
                        <i class="bi bi-clipboard-check"></i>
                        <span>审核中心</span>
                        <span class="badge badge-red" id="adminBadge" style="display: none;">待审</span>
                    </a>
                    <a href="pending-push-pool.html" class="nav-item">
                        <i class="bi bi-stack"></i>
                        <span>待推送池</span>
                    </a>
                    <a href="survey-list.html" class="nav-item">
                        <i class="bi bi-clipboard-check"></i>
                        <span>调研列表</span>
                    </a>

                    <a href="templates.html" class="nav-item">
                        <i class="bi bi-file-earmark-text"></i>
                        <span>模板中心</span>
                    </a>
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--gray-200);">
                        <a href="../index.html" class="nav-item">
                            <i class="bi bi-grid-3x3-gap"></i>
                            <span>原型导航</span>
                        </a>
                    </div>
                </nav>
            `;
        }

        const mockData = {
            '10001': { name: '张三', dept: '技术部', level: 'P7', manager: '赵经理', peers: 2, subordinates: 3 },
            '10002': { name: '李四', dept: '技术部', level: 'P6', manager: '赵经理', peers: 2, subordinates: 0 },
            '10003': { name: '王五', dept: '产品部', level: 'P6', manager: '钱经理', peers: 3, subordinates: 2 },
        };

        let selectedEmployees = [];

        function parseBatch() {
            const input = document.getElementById('batchInput').value;
            const ids = input.split(/[\n,，\s]+/).filter(id => id.trim());
            
            selectedEmployees = ids.map(id => ({
                id: id.trim(),
                ...mockData[id.trim()],
                selected: true
            })).filter(emp => emp.name);

            if (selectedEmployees.length === 0) {
                alert('未找到有效员工，请检查工号');
                return;
            }

            renderTable();
            updateStats();
            
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('batchActions').style.display = 'flex';
            document.getElementById('employeeTable').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = selectedEmployees.map((emp, idx) => `
                <div class="table-row">
                    <input type="checkbox" class="checkbox" ${emp.selected ? 'checked' : ''} onchange="toggleRow(${idx})">
                    <div class="emp-info">
                        <div class="emp-avatar">${emp.name[0]}</div>
                        <div>
                            <div class="emp-name">${emp.name}</div>
                            <div class="emp-id">${emp.id}</div>
                        </div>
                    </div>
                    <div class="emp-cell">${emp.dept}</div>
                    <div class="emp-cell">${emp.level}</div>
                    <div class="relation-summary">
                        <span class="rel-badge rel-up">上${emp.manager ? 1 : 0}</span>
                        <span class="rel-badge rel-peer">平${emp.peers}</span>
                        <span class="rel-badge rel-down">下${emp.subordinates}</span>
                    </div>
                    <div>
                        <span class="status-badge status-ready">
                            <i class="bi bi-check-circle"></i> 就绪
                        </span>
                    </div>
                    <div>
                        <i class="bi bi-trash action-btn" onclick="removeRow(${idx})"></i>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = selectedEmployees.length;
            const relations = selectedEmployees.reduce((sum, emp) => 
                sum + 1 + emp.peers + emp.subordinates, 0);
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('relationCount').textContent = relations;
            document.getElementById('msgCount').textContent = relations;
        }

        function toggleRow(idx) {
            selectedEmployees[idx].selected = !selectedEmployees[idx].selected;
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            checkAll(checked);
        }

        function checkAll(checked) {
            selectedEmployees.forEach(emp => emp.selected = checked);
            renderTable();
            document.getElementById('selectAll').checked = checked;
        }

        function removeRow(idx) {
            selectedEmployees.splice(idx, 1);
            renderTable();
            updateStats();
            
            if (selectedEmployees.length === 0) {
                document.getElementById('statsBar').style.display = 'none';
                document.getElementById('batchActions').style.display = 'none';
                document.getElementById('employeeTable').style.display = 'none';
                document.getElementById('nextBtn').disabled = true;
            }
        }

        function removeSelected() {
            selectedEmployees = selectedEmployees.filter(emp => !emp.selected);
            renderTable();
            updateStats();
            
            if (selectedEmployees.length === 0) {
                document.getElementById('statsBar').style.display = 'none';
                document.getElementById('batchActions').style.display = 'none';
                document.getElementById('employeeTable').style.display = 'none';
                document.getElementById('nextBtn').disabled = true;
            }
        }

        function clearAll() {
            selectedEmployees = [];
            document.getElementById('batchInput').value = '';
            document.getElementById('statsBar').style.display = 'none';
            document.getElementById('batchActions').style.display = 'none';
            document.getElementById('employeeTable').style.display = 'none';
            document.getElementById('nextBtn').disabled = true;
        }

        function goToStep3() {
            window.location.href = 'create-survey-step3.html?batch=true&count=' + selectedEmployees.length;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            setTimeout(parseBatch, 500);
        });
    </script>
</body>
</html>
