                    }

            },
            {
                id: "survey_prob_001",
                title: "赵六、钱七-转正评估",
                scene: "probation",
                submittedBy: "张经理",
                submittedAt: new Date(Date.now() - 43200000).toISOString(),
                status: "pending_review",
                subjects: [
                    {
                        name: "赵六", dept: "技术部", level: "P5",

            },
            {
                id: "survey_leader_001",

                submittedBy: "刘总监",

                scene: "performance",
                submittedBy: "王总监",

                    {

                            peer: [{id: "e003", name: "赵五"}],
                            down: []
                        }
                    }
                ]
            }
        ];
        
        const existing = JSON.parse(localStorage.getItem("myPendingReviews") || "[]");
        const existingIds = new Set(existing.map(s => s.id));
        let added = 0;
        
        demoSurveys.forEach(survey => {
            if (!existingIds.has(survey.id)) {
                existing.push(survey);
                added++;
            }
        });
        
        localStorage.setItem("myPendingReviews", JSON.stringify(existing));
        
        const statusDiv = document.getElementById("status");
        statusDiv.innerHTML = `
            <h2 style="color: green;">初始化完成</h2>
            <p>新增 ${added} 条示例数据，现有共 ${existing.length} 条调研</p>
            <h3>数据概览：</h3>
            <ul>
                <li>晋升评估: ${demoSurveys.filter(s => s.scene === "promotion").length} 条</li>
                <li>转正评估: ${demoSurveys.filter(s => s.scene === "probation").length} 条</li>
                <li>新Leader考察: ${demoSurveys.filter(s => s.scene === "newleader").length} 条</li>
                <li>绩效考核: ${demoSurveys.filter(s => s.scene === "performance").length} 条</li>
            </ul>

        `;
